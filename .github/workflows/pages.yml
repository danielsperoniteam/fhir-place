name: Deploy demo to GitHub Pages

# Builds main and (optionally) staging side-by-side and ships them as a single
# Pages artifact:
#   /              -> apps/demo from main
#   /goals/        -> apps/goals-tasks from main
#   /staging/      -> apps/demo from staging        (if branch exists)
#   /staging/goals -> apps/goals-tasks from staging (if branch exists)
#
# Both branches are always rebuilt so the artifact is complete — pushing to
# main would otherwise wipe /staging/.

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Check whether staging branch exists
        id: staging
        run: |
          if git ls-remote --exit-code --heads \
              "https://github.com/${{ github.repository }}.git" staging >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out staging
        if: steps.staging.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-src

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: main-src/pnpm-lock.yaml

      # ---------- main ----------
      - name: Install (main)
        working-directory: main-src
        run: pnpm install --frozen-lockfile

      - name: Build react-fhir (main)
        working-directory: main-src
        run: pnpm --filter @fhir-place/react-fhir build

      - name: Build demo (main)
        working-directory: main-src
        run: pnpm --filter @fhir-place/demo build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"

      - name: Build goals-tasks (main)
        working-directory: main-src
        run: pnpm --filter @fhir-place/goals-tasks build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/goals/"

      - name: Stage goals-tasks under /goals (main)
        run: |
          mkdir -p main-src/apps/demo/dist/goals
          cp -R main-src/apps/goals-tasks/dist/. main-src/apps/demo/dist/goals/

      - name: SPA 404 fallback (main)
        run: cp main-src/apps/demo/dist/index.html main-src/apps/demo/dist/404.html

      # ---------- staging ----------
      - name: Install (staging)
        if: steps.staging.outputs.exists == 'true'
        working-directory: staging-src
        run: pnpm install --frozen-lockfile

      - name: Build react-fhir (staging)
        if: steps.staging.outputs.exists == 'true'
        working-directory: staging-src
        run: pnpm --filter @fhir-place/react-fhir build

      - name: Build demo (staging)
        if: steps.staging.outputs.exists == 'true'
        working-directory: staging-src
        run: pnpm --filter @fhir-place/demo build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/staging/"

      - name: Build goals-tasks (staging)
        if: steps.staging.outputs.exists == 'true'
        working-directory: staging-src
        run: pnpm --filter @fhir-place/goals-tasks build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/staging/goals/"

      - name: Stage goals-tasks under /goals (staging)
        if: steps.staging.outputs.exists == 'true'
        run: |
          mkdir -p staging-src/apps/demo/dist/goals
          cp -R staging-src/apps/goals-tasks/dist/. staging-src/apps/demo/dist/goals/

      - name: SPA 404 fallback (staging)
        if: steps.staging.outputs.exists == 'true'
        run: cp staging-src/apps/demo/dist/index.html staging-src/apps/demo/dist/404.html

      # ---------- combine ----------
      - name: Combine builds into a single Pages artifact
        run: |
          mkdir -p out
          cp -R main-src/apps/demo/dist/. out/
          if [ -d staging-src/apps/demo/dist ]; then
            mkdir -p out/staging
            cp -R staging-src/apps/demo/dist/. out/staging/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
