name: Deploy demo to GitHub Pages
run-name: "Deploy Pages: ${{ inputs.staging_sha || github.ref_name }}"

# Builds main and the optional staging preview on separate runners. The
# combine job handles only inert build artifacts, so selected PR code cannot
# modify the production build or inherit deployment credentials.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      staging_sha:
        description: "Exact workflow-owned staging commit to include"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: src
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: src/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install
        working-directory: src
        run: pnpm install --frozen-lockfile

      - name: Build react-fhir
        working-directory: src
        run: pnpm --filter @fhir-place/react-fhir build

      - name: Build demo
        working-directory: src
        run: pnpm --filter @fhir-place/demo build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"

      - name: Build goals-tasks
        working-directory: src
        run: pnpm --filter @fhir-place/goals-tasks build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/goals/"

      - name: Stage goals-tasks and fallback
        run: |
          mkdir -p src/apps/demo/dist/goals
          cp -R src/apps/goals-tasks/dist/. src/apps/demo/dist/goals/
          cp src/apps/demo/dist/index.html src/apps/demo/dist/404.html

      - name: Upload main build
        uses: actions/upload-artifact@v4
        with:
          name: pages-main-build
          path: src/apps/demo/dist
          retention-days: 1

  build-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.staging.outputs.exists }}
    steps:
      - name: Check whether staging branch exists
        id: staging
        run: |
          if git ls-remote --exit-code --heads \
              "https://github.com/${{ github.repository }}.git" staging >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out exact staging commit
        if: steps.staging.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.staging_sha || 'staging' }}
          path: src
          persist-credentials: false

      - if: steps.staging.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: src/package.json
      - if: steps.staging.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install
        if: steps.staging.outputs.exists == 'true'
        working-directory: src
        run: pnpm install --frozen-lockfile

      - name: Build react-fhir
        if: steps.staging.outputs.exists == 'true'
        working-directory: src
        run: pnpm --filter @fhir-place/react-fhir build

      - name: Build demo
        if: steps.staging.outputs.exists == 'true'
        working-directory: src
        run: pnpm --filter @fhir-place/demo build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/staging/"

      - name: Build goals-tasks
        if: steps.staging.outputs.exists == 'true'
        working-directory: src
        run: pnpm --filter @fhir-place/goals-tasks build
        env:
          VITE_USE_MOCK: "false"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/staging/goals/"

      - name: Stage goals-tasks and fallback
        if: steps.staging.outputs.exists == 'true'
        run: |
          mkdir -p src/apps/demo/dist/goals
          cp -R src/apps/goals-tasks/dist/. src/apps/demo/dist/goals/
          cp src/apps/demo/dist/index.html src/apps/demo/dist/404.html

      - name: Upload staging build
        if: steps.staging.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pages-staging-build
          path: src/apps/demo/dist
          retention-days: 1

  combine:
    needs: [build-main, build-staging]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download main build
        uses: actions/download-artifact@v4
        with:
          name: pages-main-build
          path: out

      - name: Download staging build
        if: needs.build-staging.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pages-staging-build
          path: out/staging

      - name: Write cross-subapp router as the root 404.html
        run: |
          cat > out/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>fhir-place</title>
            <script>
              (function () {
                var path = location.pathname;
                var base;
                if (path.indexOf('/fhir-place/staging/goals/') === 0) {
                  base = '/fhir-place/staging/goals/';
                } else if (path.indexOf('/fhir-place/staging/') === 0) {
                  base = '/fhir-place/staging/';
                } else if (path.indexOf('/fhir-place/goals/') === 0) {
                  base = '/fhir-place/goals/';
                } else {
                  base = '/fhir-place/';
                }
                fetch(base + 'index.html', { cache: 'no-store' })
                  .then(function (r) {
                    if (!r.ok) throw new Error('sub-app index missing: ' + r.status);
                    return r.text();
                  })
                  .then(function (html) {
                    document.open();
                    document.write(html);
                    document.close();
                  })
                  .catch(function () {
                    document.body.textContent = 'fhir-place, page not found.';
                  });
              })();
            </script>
          </head>
          <body>Loading...</body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: combine
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
